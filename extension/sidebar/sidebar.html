<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexGuard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg:       #07080C;
      --bg-1:     #0D0F18;
      --bg-2:     #12141F;
      --border:   rgba(255,255,255,0.08);
      --border-1: rgba(255,255,255,0.13);
      --primary:  #6366F1;
      --cyan:     #22D3EE;
      --violation:#EF4444;
      --high:     #F97316;
      --medium:   #EAB308;
      --low:      #22C55E;
      --compliant:#10B981;
      --text:     #F1F5F9;
      --text-2:   #94A3B8;
      --text-3:   #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px; min-height: 200px; max-height: 600px;
      overflow-y: auto; overflow-x: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 13px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-1); }
    ::-webkit-scrollbar-thumb { background: var(--border-1); border-radius: 4px; }

    /* ── Header ── */
    .header {
      padding: 14px 16px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-weight: 800; font-size: 14px;
      background: linear-gradient(135deg, var(--primary), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-url { font-size: 10px; color: var(--text-3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .settings-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; padding: 4px; border-radius: 6px; }
    .settings-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

    /* ── Risk banner ── */
    .risk-banner {
      padding: 16px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .risk-icon { font-size: 2rem; flex-shrink: 0; }
    .risk-title { font-weight: 700; font-size: 14px; }
    .risk-sub   { font-size: 11px; color: var(--text-2); margin-top: 3px; }
    .risk-banner.high     { background: rgba(239,68,68,0.07);   border-left: 3px solid var(--violation); }
    .risk-banner.medium   { background: rgba(249,115,22,0.07);  border-left: 3px solid var(--high); }
    .risk-banner.safe     { background: rgba(16,185,129,0.07);  border-left: 3px solid var(--compliant); }
    .risk-banner.scanning { background: rgba(99,102,241,0.07); border-left: 3px solid var(--primary); }
    .risk-banner.neutral  { background: rgba(255,255,255,0.02); border-left: 3px solid var(--border-1); }

    /* ── Indicator pills ── */
    .indicators { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
    .indicator-pill {
      padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: rgba(239,68,68,0.1); color: #FCA5A5;
      border: 1px solid rgba(239,68,68,0.25);
    }

    /* ── Actions ── */
    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); }
    .btn {
      width: 100%; padding: 10px 16px; border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; display: flex; align-items: center;
      justify-content: center; gap: 7px; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #4F46E5);
      color: #fff; box-shadow: 0 3px 12px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { box-shadow: 0 5px 18px rgba(99,102,241,0.45); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: rgba(255,255,255,0.04); color: var(--text-2);
      border: 1px solid var(--border-1);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Language selector ── */
    .lang-row { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .lang-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); flex-shrink: 0; }
    .lang-select {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border-1);
      color: var(--text); border-radius: 7px; font-family: inherit; font-size: 11px;
      padding: 6px 10px; appearance: none; cursor: pointer; outline: none;
    }
    .lang-select:focus { border-color: var(--primary); }

    /* ── Loading ── */
    .loading { padding: 24px 16px; text-align: center; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border-1);
      border-top-color: var(--primary);
      animation: spin 0.7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-stage { font-size: 11px; color: var(--text-2); margin-top: 6px; }

    /* ── Results ── */
    .results { padding: 12px 16px; }

    /* Score row */
    .score-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; border-radius: 10px; margin-bottom: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    }
    .score-circle {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800; font-size: 17px; line-height: 1;
      border: 2px solid currentColor;
    }
    .score-circle-lbl { font-size: 8px; font-weight: 600; opacity: 0.7; margin-top: 2px; }
    .sign-row { display: flex; flex-direction: column; gap: 5px; }
    .sign-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .sign-ok  { background: rgba(16,185,129,0.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .sign-bad { background: rgba(239,68,68,0.15);  color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .power-line { font-size: 10px; color: var(--text-3); }
    .summary-text { font-size: 11px; color: var(--text-2); line-height: 1.6; margin-bottom: 12px; }

    /* Stats mini */
    .stats-mini { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .stat-mini { padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); text-align: center; }
    .stat-mini-num { font-size: 1.1rem; font-weight: 800; line-height: 1; }
    .stat-mini-lbl { font-size: 9px; color: var(--text-3); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Clause list */
    .clauses-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); margin-bottom: 8px; }
    .clause-item {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      cursor: pointer; transition: border-color 0.2s;
    }
    .clause-item:hover { border-color: var(--border-1); }
    .clause-top { display: flex; align-items: center; gap: 7px; }
    .clause-type { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-left: auto; }
    .clause-detail { display: none; margin-top: 8px; font-size: 10px; color: var(--text-2); line-height: 1.55; border-top: 1px solid var(--border); padding-top: 8px; }
    .clause-item.open .clause-detail { display: block; }
    .dark-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 5px; background: rgba(236,72,153,0.12); border: 1px solid rgba(236,72,153,0.25); color: #F9A8D4; font-size: 9px; font-weight: 600; margin-top: 5px; }
    .fair-box { margin-top: 6px; padding: 7px; border-radius: 6px; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); font-size: 10px; color: #6EE7B7; line-height: 1.5; }
    .neg-box  { margin-top: 5px; padding: 7px; border-radius: 6px; background: rgba(34,211,238,0.06); border: 1px solid rgba(34,211,238,0.2); font-size: 10px; color: #67E8F9; line-height: 1.5; }

    .risk-badge {
      padding: 2px 8px; border-radius: 5px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-violation { background: rgba(239,68,68,0.15);  color: #FCA5A5; }
    .badge-high      { background: rgba(249,115,22,0.15); color: #FDBA74; }
    .badge-medium    { background: rgba(234,179,8,0.15);  color: #FDE047; }
    .badge-low       { background: rgba(34,197,94,0.15);  color: #86EFAC; }
    .badge-compliant { background: rgba(16,185,129,0.15); color: #6EE7B7; }

    /* Open in app link */
    .open-link { padding: 10px 16px; border-top: 1px solid var(--border); }
    .open-link a { font-size: 10px; color: var(--text-3); text-decoration: none; display: flex; align-items: center; gap: 5px; }
    .open-link a:hover { color: var(--primary); }

    /* Error */
    .error-box { padding: 12px 16px; }
    .error-msg { padding: 10px 12px; border-radius: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #FCA5A5; font-size: 11px; }

    /* Not legal page */
    .not-legal { padding: 28px 16px; text-align: center; color: var(--text-2); }
    .not-legal .icon { font-size: 2rem; margin-bottom: 10px; }
    .not-legal p { font-size: 11px; line-height: 1.6; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="logo">⚖️ LexGuard</span>
  <span class="header-url" id="page-url">—</span>
  <button class="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
</div>

<!-- Content injected by JS -->
<div id="root"></div>

<script>
  const API = 'http://localhost:8000';

  let currentTabId  = null;
  let prescanResult = null;
  let analysisData  = null;

  // ── Boot ──────────────────────────────────────────────────────────────
  async function boot() {
    const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
    if (!tab) { showNotLegal('Could not read tab info.'); return; }

    currentTabId = tab.id;
    document.getElementById('page-url').textContent = new URL(tab.url).hostname;

    // Ask background for cached prescan
    chrome.runtime.sendMessage({ type: 'GET_PRESCAN_RESULT', tabId: tab.id }, result => {
      prescanResult = result;
      if (result) {
        renderPrescan(result);
      } else {
        showNotLegal('No legal content detected on this page.\nNavigate to a contract, ToS, or agreement page.');
      }
    });
  }

  // ── Prescan view ──────────────────────────────────────────────────────
  function renderPrescan(r) {
    const level  = r.level;
    const icons  = { high:'🔴', medium:'🟠', safe:'🟢', scanning:'⏳', neutral:'⚪' };
    const titles = {
      high:   'High Risk Detected',
      medium: 'Caution Advised',
      safe:   'Looks Relatively Safe',
      neutral:'Page Scanned',
    };
    const subs = {
      high:   `${r.risk_indicators?.length || 0} risk pattern(s) found. Deep analysis recommended.`,
      medium: 'Some concerning patterns detected. Review before signing.',
      safe:   'No major red flags detected in quick scan.',
      neutral:'',
    };

    let html = `
      <div class="risk-banner ${level}">
        <div class="risk-icon">${icons[level] || '⚪'}</div>
        <div>
          <div class="risk-title">${titles[level] || 'Scanned'}</div>
          <div class="risk-sub">${subs[level] || ''}</div>
        </div>
      </div>`;

    if (r.risk_indicators?.length) {
      html += `<div class="indicators">
        ${r.risk_indicators.map(i => `<span class="indicator-pill">${esc(i)}</span>`).join('')}
      </div>`;
    }

    html += `
      <div class="lang-row">
        <span class="lang-label">Output Language</span>
        <select class="lang-select" id="lang-sel">
          <option value="en">English</option>
          <option value="hi">हिन्दी</option>
          <option value="kn">ಕನ್ನಡ</option>
          <option value="ta">தமிழ்</option>
          <option value="te">తెలుగు</option>
          <option value="ml">മലയാളം</option>
          <option value="bn">বাংলা</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="analyse-btn" onclick="runFullAnalysis()">
          🔍 Deep Analysis — Clause by Clause
        </button>
        <button class="btn btn-ghost" onclick="openInApp()">
          🌐 Open Full Dashboard
        </button>
      </div>`;

    document.getElementById('root').innerHTML = html;
  }

  // ── Full analysis ─────────────────────────────────────────────────────
  async function runFullAnalysis() {
    const lang = document.getElementById('lang-sel')?.value || 'en';
    const btn  = document.getElementById('analyse-btn');
    if (btn) btn.disabled = true;

    showLoading('Extracting page text…');

    // Get full text from content script
    let text = '';
    try {
      const [result] = await chrome.scripting.executeScript({
        target: { tabId: currentTabId },
        func: () => window.__lexguardExtractText ? window.__lexguardExtractText(40000) : document.body.innerText.slice(0, 40000),
      });
      text = result?.result || '';
    } catch (err) {
      showError('Could not read page: ' + err.message);
      return;
    }

    if (!text || text.length < 100) {
      showError('Not enough text on this page to analyse.');
      return;
    }

    showLoading('Running 3-stage adversarial pipeline…');

    chrome.runtime.sendMessage({ type: 'ANALYSE_REQUEST', text, language: lang }, response => {
      if (!response || !response.ok) {
        showError((response?.error) || 'Analysis failed. Is the server running?');
        return;
      }
      const data = response.data?.analysis || response.data;
      analysisData = data;
      renderResults(data, lang);
    });
  }

  // ── Results view ──────────────────────────────────────────────────────
  function renderResults(a, lang) {
    const score      = a.overall_risk_score || 0;
    const scoreColor = score >= 70 ? '#EF4444' : score >= 40 ? '#F97316' : '#22C55E';
    const clauses    = (a.flagged_clauses || [])
      .sort((x,y) => {
        const o = {violation:0,high:1,medium:2,low:3,compliant:4};
        return (o[x.risk_level]??5) - (o[y.risk_level]??5);
      });

    const signBadge = a.safe_to_sign
      ? `<span class="sign-badge sign-ok">✅ Safe to Sign</span>`
      : `<span class="sign-badge sign-bad">🚫 Do Not Sign</span>`;

    const redFlags    = a.red_flags_count ?? 0;
    const darkPats    = a.dark_patterns_count ?? 0;
    const totalClause = clauses.length;

    const clauseHtml = clauses.slice(0, 10).map((c, i) => {
      const lvl  = c.risk_level || 'low';
      const emoj = {violation:'🔴',high:'🟠',medium:'🟡',low:'🟢',compliant:'✅'}[lvl] || '⚪';
      const dp   = c.dark_pattern
        ? `<span class="dark-pill">🎭 ${esc((c.dark_pattern_type||'dark pattern').replace(/_/g,' '))}</span>` : '';
      const fair = c.fair_version
        ? `<div class="fair-box">✍️ <strong>Fair version:</strong> ${esc(c.fair_version.slice(0,200))}</div>` : '';
      const neg  = c.negotiation_tip
        ? `<div class="neg-box">🤝 ${esc(c.negotiation_tip.slice(0,200))}</div>` : '';
      const why  = c.why_flagged ? `<div>${esc(c.why_flagged.slice(0,250))}</div>` : '';
      return `
        <div class="clause-item" id="ci-${i}" onclick="toggleClause(${i})">
          <div class="clause-top">
            <span>${emoj}</span>
            <span class="risk-badge badge-${lvl}">${lvl}</span>
            <span class="clause-type">${esc((c.clause_type||'other').replace(/_/g,' '))}</span>
          </div>
          <div class="clause-detail">
            ${why}${dp}${fair}${neg}
          </div>
        </div>`;
    }).join('');

    const moreCount = clauses.length > 10 ? clauses.length - 10 : 0;

    document.getElementById('root').innerHTML = `
      <div class="results">
        <div class="score-row">
          <div class="score-circle" style="color:${scoreColor};border-color:${scoreColor};">
            <span>${score}</span>
            <span class="score-circle-lbl">Risk</span>
          </div>
          <div class="sign-row">
            ${signBadge}
            <span class="power-line">⚖️ ${esc(a.power_imbalance || '—')}</span>
          </div>
        </div>

        <div class="stats-mini">
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:#EF4444;">${redFlags}</div>
            <div class="stat-mini-lbl">Red Flags</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:#EC4899;">${darkPats}</div>
            <div class="stat-mini-lbl">Dark Patterns</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:#94A3B8;">${totalClause}</div>
            <div class="stat-mini-lbl">Clauses</div>
          </div>
        </div>

        ${a.summary ? `<div class="summary-text">${esc(a.summary)}</div>` : ''}

        <div class="clauses-title">Flagged Clauses ${moreCount ? `(showing 10 of ${clauses.length})` : `(${clauses.length})`}</div>
        ${clauseHtml}
        ${moreCount ? `<div style="text-align:center;padding:8px 0;font-size:10px;color:var(--text-3);">+${moreCount} more — open full dashboard to see all</div>` : ''}

        <div style="padding:8px 0;display:flex;gap:8px;">
          <button class="btn btn-ghost" style="font-size:11px;" onclick="boot()">← Back</button>
          <button class="btn btn-ghost" style="font-size:11px;" onclick="openInApp()">Open Full Dashboard ↗</button>
        </div>
      </div>`;
  }

  function toggleClause(i) {
    document.getElementById('ci-'+i).classList.toggle('open');
  }

  // ── Loading / error states ─────────────────────────────────────────────
  function showLoading(stage) {
    document.getElementById('root').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div style="font-size:12px;font-weight:600;">Analysing…</div>
        <div class="loading-stage">${esc(stage)}</div>
        <div class="loading-stage" style="margin-top:8px;font-size:10px;">
          ⚔️ 3-stage adversarial AI pipeline running
        </div>
      </div>`;
  }

  function showNotLegal(msg) {
    document.getElementById('root').innerHTML = `
      <div class="not-legal">
        <div class="icon">📄</div>
        <p>${esc(msg)}</p>
        <button class="btn btn-ghost" style="margin-top:16px;font-size:11px;" onclick="openInApp()">
          📂 Upload a file instead
        </button>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('root').innerHTML = `
      <div class="error-box">
        <div class="error-msg">⚠️ ${esc(msg)}</div>
        <div style="padding:12px 0;">
          <button class="btn btn-ghost" style="font-size:11px;" onclick="boot()">← Try again</button>
        </div>
      </div>`;
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function openInApp() {
    chrome.tabs.create({ url: 'http://localhost:8000/consumer.html' });
  }
  function openSettings() {
    chrome.tabs.create({ url: 'http://localhost:8000' });
  }

  // ── Run ────────────────────────────────────────────────────────────────
  boot();
</script>
</body>
</html>
